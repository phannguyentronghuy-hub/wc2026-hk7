<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesia Animal Quiz for Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    background:linear-gradient(135deg,#ffde59 0%,#ff914d 40%,#ff5f6d 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:16px;color:#3b2a1a;
    overflow-x:hidden;
  }
  .stage{
    width:100%;max-width:520px;
    background:#fff;
    border-radius:32px;
    padding:26px 22px 30px;
    box-shadow:0 20px 60px rgba(0,0,0,.25), 0 0 0 6px rgba(255,255,255,.35);
    position:relative;
    animation:pop .4s ease-out;
  }
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  h1{
    font-family:'Baloo 2',sans-serif;
    font-size:1.9rem;line-height:1.1;text-align:center;
    color:#ff4d6d;letter-spacing:.5px;
    text-shadow:2px 2px 0 #ffde59;
  }
  .sub{text-align:center;font-size:1rem;margin-top:6px;color:#6b4a2b}
  .flag{font-size:1.4rem;vertical-align:middle}

  /* Progress */
  .progress-wrap{margin:18px 0 10px;display:flex;align-items:center;gap:10px}
  .progress{flex:1;height:14px;background:#ffe8d6;border-radius:99px;overflow:hidden;border:2px solid #ffb27a}
  .progress-fill{height:100%;background:linear-gradient(90deg,#ffd166,#ef476f);border-radius:99px;width:0%;transition:width .4s cubic-bezier(.68,-.55,.27,1.55)}
  .qcount{font-family:'Baloo 2';font-size:.95rem;color:#ff4d6d;font-weight:800;white-space:nowrap}

  /* Card */
  .card{
    background:#fffaf0;
    border-radius:24px;
    padding:20px 18px;
    border:3px dashed #ffb27a;
    text-align:center;
    animation:slide .35s ease-out;
  }
  @keyframes slide{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  .emoji{
    font-size:5.5rem;line-height:1;display:block;margin:4px 0 8px;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.15));
    animation:bounce 1.6s ease-in-out infinite;
  }
  @keyframes bounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  .question{
    font-family:'Baloo 2';
    font-size:1.35rem;line-height:1.25;
    color:#3b2a1a;margin-top:6px;
  }

  /* Options */
  .options{display:grid;gap:12px;margin-top:18px}
  .opt{
    background:#fff;
    border:3px solid #ffd166;
    border-radius:18px;
    padding:14px 16px;
    font-size:1.1rem;font-weight:600;
    color:#3b2a1a;
    cursor:pointer;
    text-align:left;
    display:flex;align-items:center;gap:12px;
    transition:transform .15s, box-shadow .15s, background .2s, border-color .2s;
    box-shadow:0 4px 0 #ffb27a;
  }
  .opt:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 0 #ffb27a}
  .opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #ffb27a}
  .opt .letter{
    width:32px;height:32px;flex-shrink:0;
    border-radius:50%;
    background:#ffde59;color:#ff4d6d;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2';font-weight:800;
  }
  .opt.correct{background:#c8f7c5;border-color:#3fb950;box-shadow:0 4px 0 #2d8a3c;animation:shake .4s}
  .opt.wrong{background:#ffd6d6;border-color:#ef4444;box-shadow:0 4px 0 #b91c1c}
  .opt.correct .letter{background:#3fb950;color:#fff}
  .opt.wrong .letter{background:#ef4444;color:#fff}
  .opt:disabled{cursor:default}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

  /* Feedback */
  .feedback{
    margin-top:16px;
    padding:12px 14px;
    border-radius:16px;
    font-family:'Baloo 2';font-size:1.05rem;
    text-align:center;
    display:none;
  }
  .feedback.show{display:block;animation:pop .3s}
  .feedback.good{background:#e7fbe6;color:#1a7a2d;border:2px solid #3fb950}
  .feedback.bad{background:#ffecec;color:#b91c1c;border:2px solid #ef4444}
  .fact{display:block;font-family:'Fredoka';font-size:.95rem;margin-top:4px;color:#3b2a1a;font-weight:500}

  .next-btn{
    display:none;margin:14px auto 0;
    background:linear-gradient(135deg,#ff4d6d,#ff914d);
    color:#fff;border:none;
    font-family:'Baloo 2';font-size:1.15rem;font-weight:800;
    padding:12px 28px;border-radius:99px;cursor:pointer;
    box-shadow:0 6px 0 #b91c1c;
    letter-spacing:.5px;
    transition:transform .15s, box-shadow .15s;
  }
  .next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #b91c1c}
  .next-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #b91c1c}
  .next-btn.show{display:block;animation:pop .3s}

  /* Result screen */
  .result{text-align:center;padding:10px 4px}
  .result .big-emoji{font-size:6rem;line-height:1;animation:bounce 1.2s infinite}
  .result h2{font-family:'Baloo 2';font-size:2rem;color:#ff4d6d;margin:10px 0 6px;text-shadow:2px 2px 0 #ffde59}
  .score{
    font-family:'Baloo 2';font-size:1.4rem;color:#3b2a1a;margin:8px 0 4px;
  }
  .stars{font-size:2.2rem;margin:6px 0 12px;letter-spacing:6px}
  .msg{font-size:1.05rem;color:#6b4a2b;margin-bottom:16px;padding:0 8px}
  .again{
    background:linear-gradient(135deg,#3fb950,#2d8a3c);
    color:#fff;border:none;
    font-family:'Baloo 2';font-size:1.2rem;font-weight:800;
    padding:14px 34px;border-radius:99px;cursor:pointer;
    box-shadow:0 6px 0 #1e5a25;
    transition:transform .15s, box-shadow .15s;
  }
  .again:hover{transform:translateY(-2px);box-shadow:0 8px 0 #1e5a25}
  .again:active{transform:translateY(3px);box-shadow:0 3px 0 #1e5a25}

  /* Speaker + mute */
  .top-controls{position:absolute;top:14px;right:16px;display:flex;gap:6px;z-index:5}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;
    background:#fff;border:2px solid #ffb27a;
    font-size:1.15rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 0 #ffb27a;
    transition:transform .12s;
  }
  .icon-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #ffb27a}
  .repeat-btn{
    display:inline-flex;align-items:center;gap:6px;
    margin:12px auto 0;
    background:#fffaf0;border:2px solid #ffb27a;
    padding:8px 16px;border-radius:99px;
    font-family:'Baloo 2';font-size:.95rem;font-weight:700;color:#ff4d6d;
    cursor:pointer;box-shadow:0 3px 0 #ffb27a;
  }
  .repeat-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #ffb27a}
  .speaking .emoji{animation:bounce .6s ease-in-out infinite}

  /* Start screen */
  .start{text-align:center;padding:14px 6px 6px}
  .start .big{font-size:6rem;line-height:1;animation:bounce 1.4s infinite;display:block}
  .start h2{font-family:'Baloo 2';font-size:1.6rem;color:#ff4d6d;margin:10px 0 6px;text-shadow:2px 2px 0 #ffde59}
  .start p{color:#6b4a2b;font-size:1rem;margin-bottom:16px;padding:0 6px}
  .start-btn{
    background:linear-gradient(135deg,#3fb950,#2d8a3c);
    color:#fff;border:none;
    font-family:'Baloo 2';font-size:1.25rem;font-weight:800;
    padding:14px 34px;border-radius:99px;cursor:pointer;
    box-shadow:0 6px 0 #1e5a25;
    display:inline-flex;align-items:center;gap:8px;
    transition:transform .15s, box-shadow .15s;
  }
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #1e5a25}
  .start-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #1e5a25}

  /* Country picker */
  .country-picker{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  .country-btn{
    border:none;cursor:pointer;
    padding:18px 10px 16px;border-radius:22px;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    font-family:'Baloo 2';
    transition:transform .15s, box-shadow .15s;
    color:#fff;
  }
  .country-btn.indo{background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 6px 0 #7a1010}
  .country-btn.aus{background:linear-gradient(135deg,#1e88e5,#0d47a1);box-shadow:0 6px 0 #082a5c}
  .country-btn:hover{transform:translateY(-3px)}
  .country-btn.indo:hover{box-shadow:0 9px 0 #7a1010}
  .country-btn.aus:hover{box-shadow:0 9px 0 #082a5c}
  .country-btn:active{transform:translateY(3px)}
  .country-btn.indo:active{box-shadow:0 3px 0 #7a1010}
  .country-btn.aus:active{box-shadow:0 3px 0 #082a5c}
  .flag-big{font-size:2.8rem;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.25))}
  .country-name{font-weight:800;font-size:1.15rem;margin-top:4px;letter-spacing:.3px}
  .country-sub{font-size:.85rem;opacity:.9;font-weight:600}

  /* Confetti */
  .confetti{position:fixed;top:-10px;font-size:1.4rem;pointer-events:none;animation:fall linear forwards;z-index:9999}
  @keyframes fall{
    to{transform:translateY(105vh) rotate(720deg)}
  }

  @media (max-width:380px){
    h1{font-size:1.55rem}
    .emoji{font-size:4.5rem}
    .question{font-size:1.15rem}
    .opt{font-size:1rem;padding:12px 12px}
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="top-controls">
      <button class="icon-btn" id="muteBtn" title="Sound on/off" aria-label="Sound">🔊</button>
    </div>
    <h1 id="mainTitle">Animal Expert Quiz</h1>
    <p class="sub" id="mainSub">Only real animal experts can guess these! 🧠✨</p>

    <div id="start-view" class="start">
      <span class="big">🐯</span>
      <h2>Pick a Country!</h2>
      <p>I will read every question out loud. Just listen and tap the answer!</p>
      <div class="country-picker">
        <button class="country-btn indo" onclick="startQuiz('indo')">
          <span class="flag-big">🇮🇩</span>
          <span class="country-name">Indonesia</span>
          <span class="country-sub">10 questions</span>
        </button>
        <button class="country-btn aus" onclick="startQuiz('aus')">
          <span class="flag-big">🇦🇺</span>
          <span class="country-name">Australia</span>
          <span class="country-sub">10 questions</span>
        </button>
      </div>
    </div>

    <div id="quiz-view" style="display:none">
      <div class="progress-wrap">
        <div class="progress"><div class="progress-fill" id="pfill"></div></div>
        <div class="qcount" id="qcount">1 / 8</div>
      </div>

      <div class="card" id="card">
        <span class="emoji" id="emoji">🐾</span>
        <p class="question" id="question">Loading…</p>
        <button class="repeat-btn" id="repeatBtn" onclick="speakQuestion()">🔊 Hear it again</button>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next">Next ➜</button>
      </div>
    </div>

    <div id="result-view" class="result" style="display:none">
      <span class="big-emoji" id="resultEmoji">🏆</span>
      <h2 id="resultTitle">Great job!</h2>
      <div class="stars" id="stars">⭐⭐⭐</div>
      <div class="score" id="scoreText">You got 8 out of 8!</div>
      <p class="msg" id="resultMsg">You know a lot about Indonesian animals!</p>
      <button class="again" onclick="restart()">Play Again 🔁</button>
    </div>
  </main>

<script>
  const QUESTIONS_INDO = [
    {
      emoji:"🐃",
      q:"Which tiny wild buffalo, only as tall as your knee, hides in the forests of Sulawesi?",
      options:["Yak","Water Buffalo","Anoa","Bison"],
      answer:2,
      fact:"The Anoa is the smallest wild buffalo in the world!"
    },
    {
      emoji:"🐗",
      q:"Which wild pig has crazy tusks that curl up right through its own snout?",
      options:["Warthog","Babirusa","Wild Boar","Peccary"],
      answer:1,
      fact:"'Babirusa' means 'pig-deer' — its tusks look like antlers!"
    },
    {
      emoji:"🥚",
      q:"Which Sulawesi bird buries its huge eggs in warm volcanic sand to keep them cozy?",
      options:["Cassowary","Kiwi","Maleo","Emu"],
      answer:2,
      fact:"Maleo chicks can fly the very same day they dig out of the sand!"
    },
    {
      emoji:"🐒",
      q:"Which Borneo monkey has a big, long, droopy nose?",
      options:["Macaque","Gibbon","Orangutan","Proboscis Monkey"],
      answer:3,
      fact:"A male Proboscis Monkey's nose can be as long as your hand — it makes his voice louder!"
    },
    {
      emoji:"🍿",
      q:"Which cat-like animal from Sumatra is famous for smelling like buttery popcorn?",
      options:["Binturong","Civet","Genet","Fossa"],
      answer:0,
      fact:"The Binturong is also called a 'bearcat' — its long tail can grip branches like a hand!"
    },
    {
      emoji:"🐻",
      q:"Which is the smallest bear in the whole world, living in Indonesia's rainforests?",
      options:["Panda Bear","Sun Bear","Polar Bear","Sloth Bear"],
      answer:1,
      fact:"Sun Bears have a golden patch on their chest that looks like the rising sun!"
    },
    {
      emoji:"🦏",
      q:"Which rare rhino is covered in reddish-brown hair, like a mini woolly mammoth?",
      options:["Javan Rhino","White Rhino","Sumatran Rhino","Black Rhino"],
      answer:2,
      fact:"The Sumatran Rhino is the only hairy rhino left on Earth — fewer than 50 remain!"
    },
    {
      emoji:"🕊️",
      q:"Which snow-white bird with a bright blue mask lives only on the island of Bali?",
      options:["Cockatoo","Bali Myna","White Dove","Snowy Owl"],
      answer:1,
      fact:"The Bali Myna is Bali's official bird — and one of the rarest birds in the world!"
    },
    {
      emoji:"🐵",
      q:"Which cute-looking Indonesian primate has a POISONOUS bite hiding under its elbow?",
      options:["Slow Loris","Tarsier","Bushbaby","Marmoset"],
      answer:0,
      fact:"The Slow Loris licks poison from its elbow before biting — the only venomous primate on Earth!"
    },
    {
      emoji:"🐟",
      q:"Which 'living fossil' fish was found alive near Sulawesi, after everyone thought it went extinct 65 million years ago?",
      options:["Piranha","Coelacanth","Sturgeon","Anglerfish"],
      answer:1,
      fact:"The Coelacanth's fins move like little legs — it's a cousin of the very first land animals!"
    }
  ];

  const QUESTIONS_AUS = [
    {
      emoji:"🐜",
      q:"Which striped marsupial slurps up 20,000 termites a day with its long sticky tongue?",
      options:["Anteater","Numbat","Aardvark","Pangolin"],
      answer:1,
      fact:"The Numbat is one of the only marsupials that eats during the daytime!"
    },
    {
      emoji:"😊",
      q:"Which small wallaby is called 'the world's happiest animal' because of its cute smile?",
      options:["Bilby","Pademelon","Quokka","Wallaroo"],
      answer:2,
      fact:"Quokkas live on Rottnest Island — their name means 'rat nest' in Dutch!"
    },
    {
      emoji:"🌵",
      q:"Which spiky Australian lizard drinks water through its FEET?",
      options:["Frilled Lizard","Bearded Dragon","Blue-Tongue","Thorny Devil"],
      answer:3,
      fact:"Raindrops travel up its skin like tiny straws — straight into its mouth!"
    },
    {
      emoji:"🦆",
      q:"Which weird Aussie animal has a duck's bill, lays eggs, AND has venom in its back feet?",
      options:["Otter","Platypus","Beaver","Echidna"],
      answer:1,
      fact:"The Platypus is one of only 5 mammals in the whole world that lays eggs!"
    },
    {
      emoji:"🟫",
      q:"Which chunky Australian animal makes CUBE-SHAPED poops?",
      options:["Koala","Wombat","Kangaroo","Tasmanian Devil"],
      answer:1,
      fact:"Wombats make up to 100 poop cubes a night to mark their territory!"
    },
    {
      emoji:"🎤",
      q:"Which sneaky Aussie bird can copy chainsaws, camera clicks, and other animals' voices?",
      options:["Kookaburra","Magpie","Lyrebird","Cockatoo"],
      answer:2,
      fact:"A Lyrebird can imitate more than 20 different sounds — perfectly!"
    },
    {
      emoji:"🐰",
      q:"Which long-eared desert marsupial does Australia celebrate at Easter instead of a bunny?",
      options:["Bilby","Bandicoot","Quoll","Potoroo"],
      answer:0,
      fact:"Bilbies dig long spiral burrows to stay cool in the hot outback!"
    },
    {
      emoji:"🦖",
      q:"Which giant blue-headed rainforest bird can jump SIX feet high and kick like a kung fu master?",
      options:["Emu","Ostrich","Cassowary","Rhea"],
      answer:2,
      fact:"The Cassowary is often called 'the world's most dangerous bird'!"
    },
    {
      emoji:"🪂",
      q:"Which pocket-sized marsupial spreads its skin like a parachute to glide between trees?",
      options:["Flying Fox","Sugar Glider","Colugo","Ringtail Possum"],
      answer:1,
      fact:"Sugar Gliders can glide as far as a school bus is long in one jump!"
    },
    {
      emoji:"🦔",
      q:"Which spiky Aussie animal lays eggs AND has a baby called a 'puggle'?",
      options:["Hedgehog","Porcupine","Anteater","Echidna"],
      answer:3,
      fact:"An Echidna baby is called a 'puggle' — the cutest baby name ever!"
    }
  ];

  let QUESTIONS = QUESTIONS_INDO;

  const CHEERS = ["Wonderful!","Awesome!","Great job!","You got it!","Super!","Fantastic!","Way to go!","Amazing!"];
  const OOPS = ["Oops! Try to remember this one:","Not this time!","Almost!","Good try!"];

  let index = 0, score = 0, locked = false;

  const $ = id => document.getElementById(id);

  /* ---------- Speech ---------- */
  const synth = window.speechSynthesis;
  let voice = null;
  let soundOn = true;

  function pickVoice(){
    if(!synth) return;
    const voices = synth.getVoices();
    if(!voices.length) return;
    const prefs = [
      /Google US English/i, /Samantha/i, /Karen/i, /Zira/i,
      /Google UK English Female/i, /Microsoft Aria/i, /Microsoft Jenny/i,
      /en[-_]US/i, /en[-_]GB/i, /^en/i
    ];
    for(const p of prefs){
      const v = voices.find(v => p.test(v.name) || p.test(v.lang));
      if(v){ voice = v; return; }
    }
    voice = voices[0];
  }
  if(synth){
    pickVoice();
    synth.addEventListener("voiceschanged", pickVoice);
  }

  function speak(text, {rate=0.9, pitch=1.2, onend} = {}){
    if(!synth || !soundOn){ if(onend) onend(); return; }
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(voice) u.voice = voice;
    u.rate = rate; u.pitch = pitch; u.volume = 1;
    u.onstart = () => document.getElementById("card")?.classList.add("speaking");
    u.onend = () => {
      document.getElementById("card")?.classList.remove("speaking");
      if(onend) onend();
    };
    u.onerror = u.onend;
    synth.speak(u);
  }

  function speakQuestion(){
    const q = QUESTIONS[index];
    const letters = ["A","B","C","D"];
    const optsText = q.options.map((t,i) => `${letters[i]}. ${t}.`).join(" ");
    speak(`${q.q} ... ${optsText}`);
  }

  function toggleMute(){
    soundOn = !soundOn;
    $("muteBtn").textContent = soundOn ? "🔊" : "🔇";
    if(!soundOn) synth?.cancel();
    else speakQuestion();
  }

  function render(){
    locked = false;
    const q = QUESTIONS[index];
    $("emoji").textContent = q.emoji;
    $("question").textContent = q.q;
    $("qcount").textContent = `${index+1} / ${QUESTIONS.length}`;
    $("pfill").style.width = `${(index/QUESTIONS.length)*100}%`;

    const opts = $("options");
    opts.innerHTML = "";
    const letters = ["A","B","C","D"];
    q.options.forEach((text, i) => {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${text}</span>`;
      btn.onclick = () => choose(i, btn);
      opts.appendChild(btn);
    });

    const fb = $("feedback");
    fb.className = "feedback";
    fb.textContent = "";
    $("next").classList.remove("show");

    /* Read the question aloud */
    setTimeout(speakQuestion, 250);
  }

  function choose(i, btn){
    if(locked) return;
    locked = true;
    const q = QUESTIONS[index];
    const correct = i === q.answer;
    const buttons = document.querySelectorAll(".opt");
    buttons.forEach(b => b.disabled = true);

    if(correct){
      btn.classList.add("correct");
      score++;
      showFeedback(true, q.fact);
      confettiBurst();
    } else {
      btn.classList.add("wrong");
      buttons[q.answer].classList.add("correct");
      showFeedback(false, q.fact);
    }
    $("next").classList.add("show");
    $("next").textContent = (index === QUESTIONS.length - 1) ? "See My Score! 🎉" : "Next ➜";
  }

  function showFeedback(good, fact){
    const fb = $("feedback");
    const cheer = good ? CHEERS[Math.floor(Math.random()*CHEERS.length)] : OOPS[Math.floor(Math.random()*OOPS.length)];
    fb.className = "feedback show " + (good ? "good" : "bad");
    fb.innerHTML = `${good?"✅":"💡"} <strong>${cheer}</strong><span class="fact">${fact}</span>`;
    speak(`${cheer} ${fact}`, {rate: 0.95});
  }

  function next(){
    index++;
    if(index >= QUESTIONS.length){
      showResult();
    } else {
      render();
    }
  }

  function showResult(){
    $("pfill").style.width = "100%";
    $("quiz-view").style.display = "none";
    const rv = $("result-view");
    rv.style.display = "block";

    const total = QUESTIONS.length;
    $("scoreText").textContent = `You got ${score} out of ${total}!`;

    let stars, title, msg, emoji;
    const pct = score/total;
    if(pct === 1){
      stars="⭐⭐⭐⭐⭐"; title="Amazing! 🏆"; emoji="🏆";
      msg="You are an Indonesian animal expert! Wow!";
      bigConfetti();
    } else if(pct >= .75){
      stars="⭐⭐⭐⭐"; title="Great job!"; emoji="🎉";
      msg="You know so much about Indonesian animals!";
      bigConfetti();
    } else if(pct >= .5){
      stars="⭐⭐⭐"; title="Nice work!"; emoji="🐾";
      msg="You are learning lots! Try again to get more stars!";
    } else if(pct >= .25){
      stars="⭐⭐"; title="Good try!"; emoji="🌱";
      msg="Play again and you will do even better!";
    } else {
      stars="⭐"; title="Keep trying!"; emoji="🌈";
      msg="Every hero starts here! Play again!";
    }
    $("stars").textContent = stars;
    $("resultTitle").textContent = title;
    $("resultMsg").textContent = msg;
    $("resultEmoji").textContent = emoji;
    speak(`${title} You got ${score} out of ${total}. ${msg}`, {rate: 0.95});
  }

  function restart(){
    index = 0; score = 0;
    synth?.cancel();
    $("result-view").style.display = "none";
    $("quiz-view").style.display = "none";
    $("start-view").style.display = "block";
    $("mainTitle").innerHTML = "Animal Expert Quiz";
    $("mainSub").textContent = "Only real animal experts can guess these! 🧠✨";
  }

  function startQuiz(country){
    QUESTIONS = country === "aus" ? QUESTIONS_AUS : QUESTIONS_INDO;
    const flag = country === "aus" ? "🇦🇺" : "🇮🇩";
    const name = country === "aus" ? "Australia" : "Indonesia";
    $("mainTitle").innerHTML = `<span class="flag">${flag}</span> ${name} Animal Quiz <span class="flag">${flag}</span>`;
    $("mainSub").textContent = `10 tricky questions about ${name}'s coolest animals!`;
    index = 0; score = 0;
    $("start-view").style.display = "none";
    $("result-view").style.display = "none";
    $("quiz-view").style.display = "block";
    /* iOS/Safari need a "warm-up" utterance on user gesture */
    if(synth){
      const warm = new SpeechSynthesisUtterance("");
      warm.volume = 0;
      synth.speak(warm);
    }
    render();
  }

  function confettiBurst(){ spawnConfetti(20); }
  function bigConfetti(){ spawnConfetti(80); }

  function spawnConfetti(n){
    const shapes = ["🎉","⭐","🌸","🍌","🍃","💛","💖","🐾"];
    for(let i=0;i<n;i++){
      const el = document.createElement("span");
      el.className = "confetti";
      el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
      el.style.left = Math.random()*100 + "vw";
      el.style.animationDuration = (2 + Math.random()*2) + "s";
      el.style.fontSize = (0.9 + Math.random()*1.3) + "rem";
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 4200);
    }
  }

  $("next").addEventListener("click", next);
  $("muteBtn").addEventListener("click", toggleMute);
</script>
</body>
</html>
