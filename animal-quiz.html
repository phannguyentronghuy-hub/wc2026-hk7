<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesia Animal Quiz for Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    background:linear-gradient(135deg,#ffde59 0%,#ff914d 40%,#ff5f6d 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:16px;color:#3b2a1a;
    overflow-x:hidden;
  }
  .stage{
    width:100%;max-width:520px;
    background:#fff;
    border-radius:32px;
    padding:26px 22px 30px;
    box-shadow:0 20px 60px rgba(0,0,0,.25), 0 0 0 6px rgba(255,255,255,.35);
    position:relative;
    animation:pop .4s ease-out;
  }
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  h1{
    font-family:'Baloo 2',sans-serif;
    font-size:1.9rem;line-height:1.1;text-align:center;
    color:#ff4d6d;letter-spacing:.5px;
    text-shadow:2px 2px 0 #ffde59;
  }
  .sub{text-align:center;font-size:1rem;margin-top:6px;color:#6b4a2b}
  .flag{font-size:1.4rem;vertical-align:middle}

  /* Progress */
  .progress-wrap{margin:18px 0 10px;display:flex;align-items:center;gap:10px}
  .progress{flex:1;height:14px;background:#ffe8d6;border-radius:99px;overflow:hidden;border:2px solid #ffb27a}
  .progress-fill{height:100%;background:linear-gradient(90deg,#ffd166,#ef476f);border-radius:99px;width:0%;transition:width .4s cubic-bezier(.68,-.55,.27,1.55)}
  .qcount{font-family:'Baloo 2';font-size:.95rem;color:#ff4d6d;font-weight:800;white-space:nowrap}

  /* Card */
  .card{
    background:#fffaf0;
    border-radius:24px;
    padding:20px 18px;
    border:3px dashed #ffb27a;
    text-align:center;
    animation:slide .35s ease-out;
  }
  @keyframes slide{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  .emoji{
    font-size:5.5rem;line-height:1;display:block;margin:4px 0 8px;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.15));
    animation:bounce 1.6s ease-in-out infinite;
  }
  @keyframes bounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  .question{
    font-family:'Baloo 2';
    font-size:1.35rem;line-height:1.25;
    color:#3b2a1a;margin-top:6px;
  }

  /* Options */
  .options{display:grid;gap:12px;margin-top:18px}
  .opt{
    background:#fff;
    border:3px solid #ffd166;
    border-radius:18px;
    padding:14px 16px;
    font-size:1.1rem;font-weight:600;
    color:#3b2a1a;
    cursor:pointer;
    text-align:left;
    display:flex;align-items:center;gap:12px;
    transition:transform .15s, box-shadow .15s, background .2s, border-color .2s;
    box-shadow:0 4px 0 #ffb27a;
  }
  .opt:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 0 #ffb27a}
  .opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #ffb27a}
  .opt .letter{
    width:32px;height:32px;flex-shrink:0;
    border-radius:50%;
    background:#ffde59;color:#ff4d6d;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2';font-weight:800;
  }
  .opt.correct{background:#c8f7c5;border-color:#3fb950;box-shadow:0 4px 0 #2d8a3c;animation:shake .4s}
  .opt.wrong{background:#ffd6d6;border-color:#ef4444;box-shadow:0 4px 0 #b91c1c}
  .opt.correct .letter{background:#3fb950;color:#fff}
  .opt.wrong .letter{background:#ef4444;color:#fff}
  .opt:disabled{cursor:default}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

  /* Feedback */
  .feedback{
    margin-top:16px;
    padding:12px 14px;
    border-radius:16px;
    font-family:'Baloo 2';font-size:1.05rem;
    text-align:center;
    display:none;
  }
  .feedback.show{display:block;animation:pop .3s}
  .feedback.good{background:#e7fbe6;color:#1a7a2d;border:2px solid #3fb950}
  .feedback.bad{background:#ffecec;color:#b91c1c;border:2px solid #ef4444}
  .fact{display:block;font-family:'Fredoka';font-size:.95rem;margin-top:4px;color:#3b2a1a;font-weight:500}

  .next-btn{
    display:none;margin:14px auto 0;
    background:linear-gradient(135deg,#ff4d6d,#ff914d);
    color:#fff;border:none;
    font-family:'Baloo 2';font-size:1.15rem;font-weight:800;
    padding:12px 28px;border-radius:99px;cursor:pointer;
    box-shadow:0 6px 0 #b91c1c;
    letter-spacing:.5px;
    transition:transform .15s, box-shadow .15s;
  }
  .next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #b91c1c}
  .next-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #b91c1c}
  .next-btn.show{display:block;animation:pop .3s}

  /* Result screen */
  .result{text-align:center;padding:10px 4px}
  .result .big-emoji{font-size:6rem;line-height:1;animation:bounce 1.2s infinite}
  .result h2{font-family:'Baloo 2';font-size:2rem;color:#ff4d6d;margin:10px 0 6px;text-shadow:2px 2px 0 #ffde59}
  .score{
    font-family:'Baloo 2';font-size:1.4rem;color:#3b2a1a;margin:8px 0 4px;
  }
  .stars{font-size:2.2rem;margin:6px 0 12px;letter-spacing:6px}
  .msg{font-size:1.05rem;color:#6b4a2b;margin-bottom:16px;padding:0 8px}
  .again{
    background:linear-gradient(135deg,#3fb950,#2d8a3c);
    color:#fff;border:none;
    font-family:'Baloo 2';font-size:1.2rem;font-weight:800;
    padding:14px 34px;border-radius:99px;cursor:pointer;
    box-shadow:0 6px 0 #1e5a25;
    transition:transform .15s, box-shadow .15s;
  }
  .again:hover{transform:translateY(-2px);box-shadow:0 8px 0 #1e5a25}
  .again:active{transform:translateY(3px);box-shadow:0 3px 0 #1e5a25}

  /* Speaker + mute */
  .top-controls{position:absolute;top:14px;right:16px;display:flex;gap:6px;z-index:5}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;
    background:#fff;border:2px solid #ffb27a;
    font-size:1.15rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 0 #ffb27a;
    transition:transform .12s;
  }
  .icon-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #ffb27a}
  .repeat-btn{
    display:inline-flex;align-items:center;gap:6px;
    margin:12px auto 0;
    background:#fffaf0;border:2px solid #ffb27a;
    padding:8px 16px;border-radius:99px;
    font-family:'Baloo 2';font-size:.95rem;font-weight:700;color:#ff4d6d;
    cursor:pointer;box-shadow:0 3px 0 #ffb27a;
  }
  .repeat-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #ffb27a}
  .speaking .emoji{animation:bounce .6s ease-in-out infinite}

  /* Start screen */
  .start{text-align:center;padding:14px 6px 6px}
  .start .big{font-size:6rem;line-height:1;animation:bounce 1.4s infinite;display:block}
  .start h2{font-family:'Baloo 2';font-size:1.6rem;color:#ff4d6d;margin:10px 0 6px;text-shadow:2px 2px 0 #ffde59}
  .start p{color:#6b4a2b;font-size:1rem;margin-bottom:16px;padding:0 6px}
  .start-btn{
    background:linear-gradient(135deg,#3fb950,#2d8a3c);
    color:#fff;border:none;
    font-family:'Baloo 2';font-size:1.25rem;font-weight:800;
    padding:14px 34px;border-radius:99px;cursor:pointer;
    box-shadow:0 6px 0 #1e5a25;
    display:inline-flex;align-items:center;gap:8px;
    transition:transform .15s, box-shadow .15s;
  }
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #1e5a25}
  .start-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #1e5a25}

  /* Confetti */
  .confetti{position:fixed;top:-10px;font-size:1.4rem;pointer-events:none;animation:fall linear forwards;z-index:9999}
  @keyframes fall{
    to{transform:translateY(105vh) rotate(720deg)}
  }

  @media (max-width:380px){
    h1{font-size:1.55rem}
    .emoji{font-size:4.5rem}
    .question{font-size:1.15rem}
    .opt{font-size:1rem;padding:12px 12px}
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="top-controls">
      <button class="icon-btn" id="muteBtn" title="Sound on/off" aria-label="Sound">🔊</button>
    </div>
    <h1><span class="flag">🇮🇩</span> Fun Animals of Indonesia! <span class="flag">🇮🇩</span></h1>
    <p class="sub">Can you guess them all?</p>

    <div id="start-view" class="start">
      <span class="big">🐯</span>
      <h2>Ready to Play?</h2>
      <p>I will read each question out loud. Just listen and tap the answer!</p>
      <button class="start-btn" onclick="startQuiz()">▶ Start Quiz</button>
    </div>

    <div id="quiz-view" style="display:none">
      <div class="progress-wrap">
        <div class="progress"><div class="progress-fill" id="pfill"></div></div>
        <div class="qcount" id="qcount">1 / 8</div>
      </div>

      <div class="card" id="card">
        <span class="emoji" id="emoji">🐾</span>
        <p class="question" id="question">Loading…</p>
        <button class="repeat-btn" id="repeatBtn" onclick="speakQuestion()">🔊 Hear it again</button>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next">Next ➜</button>
      </div>
    </div>

    <div id="result-view" class="result" style="display:none">
      <span class="big-emoji" id="resultEmoji">🏆</span>
      <h2 id="resultTitle">Great job!</h2>
      <div class="stars" id="stars">⭐⭐⭐</div>
      <div class="score" id="scoreText">You got 8 out of 8!</div>
      <p class="msg" id="resultMsg">You know a lot about Indonesian animals!</p>
      <button class="again" onclick="restart()">Play Again 🔁</button>
    </div>
  </main>

<script>
  const QUESTIONS = [
    {
      emoji:"🦎",
      q:"Which giant lizard lives on the island of Komodo?",
      options:["Komodo Dragon","Green Frog","Sea Turtle","Little Gecko"],
      answer:0,
      fact:"Komodo Dragons are the biggest lizards in the world!"
    },
    {
      emoji:"🦧",
      q:"This furry orange ape swings in the trees of Borneo and Sumatra. Who is it?",
      options:["Panda","Orangutan","Gorilla","Monkey"],
      answer:1,
      fact:"'Orangutan' means 'person of the forest' in Indonesian!"
    },
    {
      emoji:"🐘",
      q:"Which big-eared animal walks in Sumatra's jungle?",
      options:["Rhino","Camel","Sumatran Elephant","Hippo"],
      answer:2,
      fact:"Sumatran Elephants love to eat leaves and fruit."
    },
    {
      emoji:"🐅",
      q:"Which striped big cat sneaks through Sumatran forests?",
      options:["Cheetah","Lion","Leopard","Sumatran Tiger"],
      answer:3,
      fact:"The Sumatran Tiger is the smallest tiger in the world!"
    },
    {
      emoji:"🦜",
      q:"Which very colorful bird is famous in Papua, Indonesia?",
      options:["Penguin","Bird of Paradise","Ostrich","Owl"],
      answer:1,
      fact:"Bird of Paradise dances to say hello!"
    },
    {
      emoji:"🐢",
      q:"Which slow animal swims in Indonesia's blue sea?",
      options:["Sea Turtle","Crocodile","Shark","Dolphin"],
      answer:0,
      fact:"Sea Turtles can live for over 100 years!"
    },
    {
      emoji:"🦇",
      q:"Which tiny animal has HUGE eyes and jumps at night in Sulawesi?",
      options:["Rabbit","Cat","Tarsier","Mouse"],
      answer:2,
      fact:"A Tarsier's eyes are bigger than its brain!"
    },
    {
      emoji:"🦏",
      q:"Which one-horned animal is very rare in Java, Indonesia?",
      options:["Cow","Unicorn","Deer","Javan Rhino"],
      answer:3,
      fact:"There are fewer than 80 Javan Rhinos left in the world!"
    }
  ];

  const CHEERS = ["Wonderful!","Awesome!","Great job!","You got it!","Super!","Fantastic!","Way to go!","Amazing!"];
  const OOPS = ["Oops! Try to remember this one:","Not this time!","Almost!","Good try!"];

  let index = 0, score = 0, locked = false;

  const $ = id => document.getElementById(id);

  /* ---------- Speech ---------- */
  const synth = window.speechSynthesis;
  let voice = null;
  let soundOn = true;

  function pickVoice(){
    if(!synth) return;
    const voices = synth.getVoices();
    if(!voices.length) return;
    const prefs = [
      /Google US English/i, /Samantha/i, /Karen/i, /Zira/i,
      /Google UK English Female/i, /Microsoft Aria/i, /Microsoft Jenny/i,
      /en[-_]US/i, /en[-_]GB/i, /^en/i
    ];
    for(const p of prefs){
      const v = voices.find(v => p.test(v.name) || p.test(v.lang));
      if(v){ voice = v; return; }
    }
    voice = voices[0];
  }
  if(synth){
    pickVoice();
    synth.addEventListener("voiceschanged", pickVoice);
  }

  function speak(text, {rate=0.9, pitch=1.2, onend} = {}){
    if(!synth || !soundOn){ if(onend) onend(); return; }
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(voice) u.voice = voice;
    u.rate = rate; u.pitch = pitch; u.volume = 1;
    u.onstart = () => document.getElementById("card")?.classList.add("speaking");
    u.onend = () => {
      document.getElementById("card")?.classList.remove("speaking");
      if(onend) onend();
    };
    u.onerror = u.onend;
    synth.speak(u);
  }

  function speakQuestion(){
    const q = QUESTIONS[index];
    const letters = ["A","B","C","D"];
    const optsText = q.options.map((t,i) => `${letters[i]}. ${t}.`).join(" ");
    speak(`${q.q} ... ${optsText}`);
  }

  function toggleMute(){
    soundOn = !soundOn;
    $("muteBtn").textContent = soundOn ? "🔊" : "🔇";
    if(!soundOn) synth?.cancel();
    else speakQuestion();
  }

  function render(){
    locked = false;
    const q = QUESTIONS[index];
    $("emoji").textContent = q.emoji;
    $("question").textContent = q.q;
    $("qcount").textContent = `${index+1} / ${QUESTIONS.length}`;
    $("pfill").style.width = `${(index/QUESTIONS.length)*100}%`;

    const opts = $("options");
    opts.innerHTML = "";
    const letters = ["A","B","C","D"];
    q.options.forEach((text, i) => {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${text}</span>`;
      btn.onclick = () => choose(i, btn);
      opts.appendChild(btn);
    });

    const fb = $("feedback");
    fb.className = "feedback";
    fb.textContent = "";
    $("next").classList.remove("show");

    /* Read the question aloud */
    setTimeout(speakQuestion, 250);
  }

  function choose(i, btn){
    if(locked) return;
    locked = true;
    const q = QUESTIONS[index];
    const correct = i === q.answer;
    const buttons = document.querySelectorAll(".opt");
    buttons.forEach(b => b.disabled = true);

    if(correct){
      btn.classList.add("correct");
      score++;
      showFeedback(true, q.fact);
      confettiBurst();
    } else {
      btn.classList.add("wrong");
      buttons[q.answer].classList.add("correct");
      showFeedback(false, q.fact);
    }
    $("next").classList.add("show");
    $("next").textContent = (index === QUESTIONS.length - 1) ? "See My Score! 🎉" : "Next ➜";
  }

  function showFeedback(good, fact){
    const fb = $("feedback");
    const cheer = good ? CHEERS[Math.floor(Math.random()*CHEERS.length)] : OOPS[Math.floor(Math.random()*OOPS.length)];
    fb.className = "feedback show " + (good ? "good" : "bad");
    fb.innerHTML = `${good?"✅":"💡"} <strong>${cheer}</strong><span class="fact">${fact}</span>`;
    speak(`${cheer} ${fact}`, {rate: 0.95});
  }

  function next(){
    index++;
    if(index >= QUESTIONS.length){
      showResult();
    } else {
      render();
    }
  }

  function showResult(){
    $("pfill").style.width = "100%";
    $("quiz-view").style.display = "none";
    const rv = $("result-view");
    rv.style.display = "block";

    const total = QUESTIONS.length;
    $("scoreText").textContent = `You got ${score} out of ${total}!`;

    let stars, title, msg, emoji;
    const pct = score/total;
    if(pct === 1){
      stars="⭐⭐⭐⭐⭐"; title="Amazing! 🏆"; emoji="🏆";
      msg="You are an Indonesian animal expert! Wow!";
      bigConfetti();
    } else if(pct >= .75){
      stars="⭐⭐⭐⭐"; title="Great job!"; emoji="🎉";
      msg="You know so much about Indonesian animals!";
      bigConfetti();
    } else if(pct >= .5){
      stars="⭐⭐⭐"; title="Nice work!"; emoji="🐾";
      msg="You are learning lots! Try again to get more stars!";
    } else if(pct >= .25){
      stars="⭐⭐"; title="Good try!"; emoji="🌱";
      msg="Play again and you will do even better!";
    } else {
      stars="⭐"; title="Keep trying!"; emoji="🌈";
      msg="Every hero starts here! Play again!";
    }
    $("stars").textContent = stars;
    $("resultTitle").textContent = title;
    $("resultMsg").textContent = msg;
    $("resultEmoji").textContent = emoji;
    speak(`${title} You got ${score} out of ${total}. ${msg}`, {rate: 0.95});
  }

  function restart(){
    index = 0; score = 0;
    $("result-view").style.display = "none";
    $("quiz-view").style.display = "block";
    render();
  }

  function startQuiz(){
    $("start-view").style.display = "none";
    $("quiz-view").style.display = "block";
    /* iOS/Safari need a "warm-up" utterance on user gesture */
    if(synth){
      const warm = new SpeechSynthesisUtterance("");
      warm.volume = 0;
      synth.speak(warm);
    }
    render();
  }

  function confettiBurst(){ spawnConfetti(20); }
  function bigConfetti(){ spawnConfetti(80); }

  function spawnConfetti(n){
    const shapes = ["🎉","⭐","🌸","🍌","🍃","💛","💖","🐾"];
    for(let i=0;i<n;i++){
      const el = document.createElement("span");
      el.className = "confetti";
      el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
      el.style.left = Math.random()*100 + "vw";
      el.style.animationDuration = (2 + Math.random()*2) + "s";
      el.style.fontSize = (0.9 + Math.random()*1.3) + "rem";
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 4200);
    }
  }

  $("next").addEventListener("click", next);
  $("muteBtn").addEventListener("click", toggleMute);
</script>
</body>
</html>
